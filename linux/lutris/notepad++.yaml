name: Notepad++
game_slug: npp
version: Installer
slug: npp
description: Notepad++ is a free source code editor and Notepad replacement that supports several languages.
runner: wine
script:
  files:
  - setup:
      filename: npp.8.9.2.Installer.x64.exe
      url: https://github.com/notepad-plus-plus/notepad-plus-plus/releases/download/v8.9.2/npp.8.9.2.Installer.x64.exe
  game:
    arch: win64
    exe: $GAMEDIR/npp.exe
    prefix: $GAMEDIR
    working_dir: $GAMEDIR
  installer:
  - task:
    name: create_prefix
    arch: win64
    description: Creating 64bit Wine prefix.
    prefix: $GAMEDIR
  - task:
    description: Installing Notepad++
    executable: setup
    name: wineexec
    prefix: $GAMEDIR
  - task:
    name: winekill
    prefix: $GAMEDIR
